<script>
(function(){
  "use strict";
  const STORAGE_KEY = "junoHairVouchers";
  const SETTLEMENTS_KEY = "junoHairSettlements";
  const COMMISSION_RATE = 0.20;

  /* ---------------- Simulasi Hak Akses (Role-Based View) ---------------- */
  function getRoleFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('role') || 'customer'; // Default jadi customer kalau dibuka biasa
  }

  function applyRoleAccess() {
    const role = getRoleFromURL();
    const switcherContainer = document.querySelector('.topbar-inner div[style*="display:flex"]');
    const customerBtn = document.querySelector('button[data-view="customer"]');
    const salonBtn = document.querySelector('button[data-view="salon"]');
    const agencyBtn = document.querySelector('button[data-view="agency"]');

    // Sembunyikan semua tombol navigasi terlebih dahulu
    customerBtn.style.display = 'none';
    salonBtn.style.display = 'none';
    agencyBtn.style.display = 'none';

    if (role === 'customer') {
      // Customer hanya bisa melihat Customer View, sembunyikan baris tombol admin jika diperlukan
      customerBtn.style.display = 'block';
      // Menyembunyikan seluruh kotak switcher agar customer tidak bisa klik tab lain saat demo
      document.querySelector('.switcher').style.display = 'none'; 
      document.querySelector('.mode-label').style.display = 'none';
      switchView('customer');
    } 
    else if (role === 'salon') {
      // Salon bisa melihat Customer View & Salon Dashboard
      customerBtn.style.display = 'block';
      salonBtn.style.display = 'block';
      switchView('salon'); // Otomatis buka halaman salon saat dimuat
    } 
    else if (role === 'admin') {
      // Agency Admin bisa melihat ketiga-tiganya
      customerBtn.style.display = 'block';
      salonBtn.style.display = 'block';
      agencyBtn.style.display = 'block';
      switchView('agency'); // Otomatis buka halaman agency saat dimuat
    }
  }

  /* ---------------- Data layer ---------------- */
  function loadData(){
    let raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      const seeded = seedData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
      return seeded;
    }
    try{ return JSON.parse(raw); } catch(e){ const seeded = seedData(); localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded)); return seeded; }
  }
  function saveData(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  function seedData(){
    const today = new Date();
    const iso = (offsetDays) => {
      const d = new Date(today); d.setDate(d.getDate() + offsetDays);
      return d.toISOString().slice(0,10);
    };
    return [
      { id:"JN-482913", name:"Amara Chen", phone:"010-2231-8842", date:iso(3), status:"Pending", amountPaid:null, commission:null, dateIssued:iso(-4), dateRedeemed:null },
      { id:"JN-661027", name:"Liam Osei", phone:"010-7745-1129", date:iso(-2), status:"Redeemed", amountPaid:96.00, commission:19.20, dateIssued:iso(-9), dateRedeemed:iso(-2) },
      { id:"JN-337750", name:"Ha-eun Park", phone:"010-3390-6674", date:iso(6), status:"Pending", amountPaid:null, commission:null, dateIssued:iso(-1), dateRedeemed:null },
      { id:"JN-904215", name:"Sofia Marchetti", phone:"010-5528-0093", date:iso(-6), status:"Redeemed", amountPaid:142.50, commission:28.50, dateIssued:iso(-12), dateRedeemed:iso(-6) },
      { id:"JN-118864", name:"Daniel Okafor", phone:"010-6612-4470", date:iso(-1), status:"Redeemed", amountPaid:78.00, commission:15.60, dateIssued:iso(-8), dateRedeemed:iso(-1) },
      { id:"JN-570332", name:"Yuna Kim", phone:"010-9981-3305", date:iso(10), status:"Pending", amountPaid:null, commission:null, dateIssued:iso(0), dateRedeemed:null }
    ];
  }

  let vouchers = loadData();

  /* ---------------- Settlement data layer ---------------- */
  function loadSettlements(){
    try{ return JSON.parse(localStorage.getItem(SETTLEMENTS_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveSettlements(data){ localStorage.setItem(SETTLEMENTS_KEY, JSON.stringify(data)); }
  let settlements = loadSettlements();

  /* ---------------- Helpers ---------------- */
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }
  function fmtDate(iso){
    if(!iso) return "—";
    const d = new Date(iso + "T00:00:00");
    if(isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }
  function fmtMoney(n){
    if(n === null || n === undefined) return "—";
    return "$" + Number(n).toFixed(2);
  }
  function genVoucherId(){
    let id;
    do{
      const num = Math.floor(100000 + Math.random() * 900000);
      id = "JN-" + num;
    } while(vouchers.some(v => v.id === id));
    return id;
  }

  /* ---------------- View switching ---------------- */
  const switcher = document.querySelector('.switcher');
  switcher.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-view]');
    if(!btn) return;
    switchView(btn.dataset.view);
  });
  function switchView(view){
    document.querySelectorAll('.switcher button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    if(view === 'salon') renderSalon();
    if(view === 'agency') renderAgency();
  }

  /* ---------------- Customer view ---------------- */
  const claimForm = document.getElementById('claimForm');
  const voucherSlot = document.getElementById('voucherSlot');

  claimForm.addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const date = document.getElementById('custDate').value;
    if(!name || !phone || !date) return;

    const voucher = {
      id: genVoucherId(),
      name, phone, date,
      status: "Pending",
      amountPaid: null,
      commission: null,
      dateIssued: new Date().toISOString().slice(0,10),
      dateRedeemed: null
    };
    vouchers.push(voucher);
    saveData(vouchers);
    renderVoucherCard(voucher);
    claimForm.reset();
  });

  function renderVoucherCard(v){
    voucherSlot.innerHTML = `
      <div class="ticket">
        <div class="ticket-body">
          <span class="off">20% OFF</span>
          <div class="label">Digital Voucher</div>
          <p class="cust-name">${escapeHtml(v.name)}</p>
          <div class="ticket-row"><span>Phone</span><span>${escapeHtml(v.phone)}</span></div>
          <div class="ticket-row"><span>Preferred date</span><span>${fmtDate(v.date)}</span></div>
          <div class="ticket-row"><span>Issued</span><span>${fmtDate(v.dateIssued)}</span></div>
          <div class="ticket-note">Show this voucher at Juno Hair for 20% off your service. Present the ID at checkout.</div>
        </div>
        <div class="ticket-stub">
          <div class="pct">20%</div>
          <div class="pct-sub">off</div>
          <div class="vid mono">${v.id}</div>
        </div>
      </div>
    `;
  }

  /* ---------------- Salon view ---------------- */
  const salonSearch = document.getElementById('salonSearch');
  const salonTableBody = document.getElementById('salonTableBody');
  const redeemId = document.getElementById('redeemId');
  const redeemAmount = document.getElementById('redeemAmount');
  const completeBtn = document.getElementById('completeBtn');
  const redeemMsg = document.getElementById('redeemMsg');
  const pendingIdsList = document.getElementById('pendingIds');

  salonSearch.addEventListener('input', () => renderSalon());

  function renderSalon(){
    const term = salonSearch.value.trim().toLowerCase();
    const rows = [...vouchers]
      .sort((a,b) => (b.dateIssued || '').localeCompare(a.dateIssued || ''))
      .filter(v => !term ||
        v.name.toLowerCase().includes(term) ||
        v.phone.toLowerCase().includes(term) ||
        v.id.toLowerCase().includes(term)
      );

    salonTableBody.innerHTML = rows.length ? rows.map(v => `
      <tr>
        <td>${escapeHtml(v.name)}</td>
        <td>${escapeHtml(v.phone)}</td>
        <td class="id-mono">${v.id}</td>
        <td><span class="badge ${v.status === 'Redeemed' ? 'redeemed' : 'pending'}">${v.status}</span></td>
        <td>${fmtDate(v.date)}</td>
      </tr>
    `).join('') : `<tr class="empty-row"><td colspan="5">No vouchers match your search.</td></tr>`;

    pendingIdsList.innerHTML = vouchers
      .filter(v => v.status === 'Pending')
      .map(v => `<option value="${v.id}">${escapeHtml(v.name)}</option>`)
      .join('');
  }

  completeBtn.addEventListener('click', () => {
    const id = redeemId.value.trim().toUpperCase();
    const amount = parseFloat(redeemAmount.value);
    hideMsg();

    if(!id){ showMsg('err', 'Enter or select a voucher ID.'); return; }
    const voucher = vouchers.find(v => v.id === id);
    if(!voucher){ showMsg('err', `No voucher found with ID ${id}.`); return; }
    if(voucher.status === 'Redeemed'){ showMsg('err', `Voucher ${id} has already been redeemed.`); return; }
    if(isNaN(amount) || amount <= 0){ showMsg('err', 'Enter a valid final amount paid.'); return; }

    voucher.status = 'Redeemed';
    voucher.amountPaid = Math.round(amount * 100) / 100;
    voucher.commission = Math.round(amount * COMMISSION_RATE * 100) / 100;
    voucher.dateRedeemed = new Date().toISOString().slice(0,10);
    saveData(vouchers);

    showMsg('ok', `Transaction complete — ${voucher.name}'s voucher (${id}) redeemed for ${fmtMoney(voucher.amountPaid)}.`);
    redeemId.value = '';
    redeemAmount.value = '';
    renderSalon();
  });

  function showMsg(type, text){
    redeemMsg.textContent = text;
    redeemMsg.className = 'msg show ' + type;
  }
  function hideMsg(){ redeemMsg.className = 'msg'; }

  /* ---------------- Agency view ---------------- */
  const agencyTableBody = document.getElementById('agencyTableBody');
  const settlementTableBody = document.getElementById('settlementTableBody');

  function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
  function monthLabel(key){
    const [y, m] = key.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month:'long', year:'numeric' });
  }

  function computeMonthlyGroups(){
    const groups = {};
    vouchers
      .filter(v => v.status === 'Redeemed' && v.dateRedeemed)
      .forEach(v => {
        const key = monthKeyOf(v.dateRedeemed);
        if(!groups[key]) groups[key] = { count:0, revenue:0, commission:0 };
        groups[key].count += 1;
        groups[key].revenue += v.amountPaid || 0;
        groups[key].commission += v.commission || 0;
      });
    return groups;
  }

  function renderSettlements(){
    const groups = computeMonthlyGroups();
    const keys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    settlementTableBody.innerHTML = keys.length ? keys.map(key => {
      const g = groups[key];
      const state = settlements[key];
      const isSettled = state && state.status === 'Settled';
      const actionCell = isSettled
        ? `<div class="action-cell">
             <span class="settled-note">Settled on <strong>${fmtDate(state.settledDate)}</strong></span>
             <button class="reopen-btn" data-month="${key}" data-action="reopen">Reopen</button>
           </div>`
        : `<button class="settle-btn" data-month="${key}" data-action="settle">Mark as Settled</button>`;

      return `
        <tr>
          <td>${monthLabel(key)}</td>
          <td>${g.count}</td>
          <td>${fmtMoney(g.revenue)}</td>
          <td>${fmtMoney(g.commission)}</td>
          <td><span class="badge ${isSettled ? 'redeemed' : 'pending'}">${isSettled ? 'Settled' : 'Pending'}</span></td>
          <td>${actionCell}</td>
        </tr>
      `;
    }).join('') : `<tr class="empty-row"><td colspan="6">No redeemed transactions yet to settle.</td></tr>`;
  }

  settlementTableBody.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-month]');
    if(!btn) return;
    const key = btn.dataset.month;
    if(btn.dataset.action === 'settle'){
      settlements[key] = { status:'Settled', settledDate:new Date().toISOString().slice(0,10) };
    } else {
      delete settlements[key];
    }
    saveSettlements(settlements);
    renderSettlements();
  });

  function renderAgency(){
    const issued = vouchers.length;
    const redeemed = vouchers.filter(v => v.status === 'Redeemed');
    const revenue = redeemed.reduce((sum, v) => sum + (v.amountPaid || 0), 0);
    const commission = redeemed.reduce((sum, v) => sum + (v.commission || 0), 0);

    document.getElementById('mIssued').textContent = issued;
    document.getElementById('mRedeemed').textContent = redeemed.length;
    document.getElementById('mRevenue').textContent = fmtMoney(revenue);
    document.getElementById('mCommission').textContent = fmtMoney(commission);

    const rows = [...vouchers].sort((a,b) => {
      const da = a.dateRedeemed || a.dateIssued || '';
      const db = b.dateRedeemed || b.dateIssued || '';
      return db.localeCompare(da);
    });

    agencyTableBody.innerHTML = rows.length ? rows.map(v => `
      <tr>
        <td>${fmtDate(v.dateRedeemed || v.dateIssued)}</td>
        <td>${escapeHtml(v.name)}</td>
        <td class="id-mono">${v.id}</td>
        <td><span class="badge ${v.status === 'Redeemed' ? 'redeemed' : 'pending'}">${v.status}</span></td>
        <td>${fmtMoney(v.amountPaid)}</td>
        <td>${v.commission !== null ? fmtMoney(v.commission) : '—'}</td>
      </tr>
    `).join('') : `<tr class="empty-row"><td colspan="6">No transactions yet.</td></tr>`;

    renderSettlements();
  }

  /* ---------------- Export to Excel ---------------- */
  const exportBtn = document.getElementById('exportBtn');

  function csvEscape(value){
    const str = value === null || value === undefined ? '' : String(value);
    if(/[",\n]/.test(str)){
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  function exportToExcel(){
    const headers = [
      'Date Issued', 'Customer Name', 'Phone', 'Email', 'Voucher ID',
      'Status', 'Preferred Date', 'Amount Paid', 'Commission Earned', 'Date Redeemed'
    ];

    const rows = [...vouchers]
      .sort((a, b) => (a.dateIssued || '').localeCompare(b.dateIssued || ''))
      .map(v => [
        v.dateIssued || '',
        v.name || '',
        v.phone || '',
        v.email || '',
        v.id || '',
        v.status || '',
        v.date || '',
        v.amountPaid !== null && v.amountPaid !== undefined ? v.amountPaid.toFixed(2) : '',
        v.commission !== null && v.commission !== undefined ? v.commission.toFixed(2) : '',
        v.dateRedeemed || ''
      ]);

    const csvLines = [headers, ...rows].map(row => row.map(csvEscape).join(','));
    const csvContent = '\uFEFF' + csvLines.join('\r\n');

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    link.href = url;
    link.download = `juno-hair-vouchers-${stamp}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  exportBtn.addEventListener('click', exportToExcel);

  /* ---------------- Init ---------------- */
  renderSalon();
  renderAgency();
  applyRoleAccess(); // Menjalankan filter role saat halaman dimuat
})();
</script>
